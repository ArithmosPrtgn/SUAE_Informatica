<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/colorsIcons.css">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/a11y.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    <link rel="icon" type="image/x-icon" href="/resources/favicon.svg" />
    <link rel="stylesheet" rel="preload" as="font" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <link rel="preload" as="font" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <div id="hideContent"></div>
        <div id="access" class="cal-sans-regular">
            <div>
                <h1></h1>
                <button id="iQuit">
                    <span class="material-symbols-rounded iconMNeedsSpace iconM">keyboard_arrow_left</span>
                    <h4>Voltar</h4>
                </button>
            </div>
            <div>
                <div class="optionAccess">
                    <div>
                        <span class="material-symbols-rounded iconMNeedsSpace iconM">format_size</span>
                        <h4>Tamanho de texto:</h4>
                    </div>
                    <div class="slide">
                    <input type="range" id="textSize" min="0.5" max="2" value="1" step="0.1">
                        <div class="ticks">
                            <span>0.5</span>
                            <span>1</span>
                            <span>1.5</span>
                            <span>2</span>
                        </div>
                    </div>
                </div>
                <div class="optionAccess">
                    <div>
                        <span class="material-symbols-rounded iconMNeedsSpace iconM">animation</span>
                        <h4>Animações:</h4>
                    </div>
                    <span class="chck"><input type="checkbox" id="animatedWebsite" checked></span>
                </div>
                <div class="optionAccess">
                    <div>
                        <span class="material-symbols-rounded iconMNeedsSpace iconM">contrast</span>
                        <h4>Alto Contraste:</h4>
                    </div>
                    <span class="chck"><input type="checkbox" id="highContrast"></span>
                </div>
            </div>

        </div>

    
</body>
</html>
